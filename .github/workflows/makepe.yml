name: makepe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Download official ADK installers
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2289980' -OutFile "$env:RUNNER_TEMP\adksetup.exe"
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2289981' -OutFile "$env:RUNNER_TEMP\adkwinpesetup.exe"

      - name: Install ADK Deployment Tools
        shell: powershell
        run: |
          Start-Process -FilePath "$env:RUNNER_TEMP\adksetup.exe" -ArgumentList @(
            '/quiet',
            '/norestart',
            '/ceip', 'off',
            '/features', 'OptionId.DeploymentTools'
          ) -Wait -NoNewWindow

      - name: Install WinPE add-on
        shell: powershell
        run: |
          Start-Process -FilePath "$env:RUNNER_TEMP\adkwinpesetup.exe" -ArgumentList @(
            '/quiet',
            '/norestart',
            '/ceip', 'off',
            '/features', 'OptionId.WindowsPreinstallationEnvironment'
          ) -Wait -NoNewWindow

      - name: Build PE and inject autodeploy only
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-External {
            param(
              [Parameter(Mandatory = $true)]
              [string]$FilePath,

              [Parameter(Mandatory = $true)]
              [string[]]$ArgumentList
            )

            Write-Host ("Running: {0} {1}" -f $FilePath, ($ArgumentList -join ' '))
            $process = Start-Process -FilePath $FilePath -ArgumentList $ArgumentList -Wait -PassThru -NoNewWindow
            if ($process.ExitCode -ne 0) {
              throw ("Command failed with exit code {0}: {1}" -f $process.ExitCode, $FilePath)
            }
          }

          $kitsRoots = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Windows Kits'),
            (Join-Path $env:ProgramFiles 'Windows Kits')
          ) | Select-Object -Unique

          $existingKitsRoots = @($kitsRoots | Where-Object { Test-Path -LiteralPath $_ -PathType Container })
          if ($existingKitsRoots.Count -eq 0) {
            throw 'No Windows Kits root was found after ADK installation.'
          }

          $assessmentRoots = @(
            foreach ($kitsRoot in $existingKitsRoots) {
              Get-ChildItem -LiteralPath $kitsRoot -Directory -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -eq 'Assessment and Deployment Kit' } |
                Select-Object -ExpandProperty FullName
            }
          ) | Select-Object -Unique

          if ($assessmentRoots.Count -eq 0) {
            throw 'Assessment and Deployment Kit directory was not found under any Windows Kits root.'
          }

          $copype = @(
            foreach ($root in $assessmentRoots) {
              Get-ChildItem -LiteralPath $root -Filter 'copype.cmd' -File -Recurse -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty FullName
            }
          ) | Select-Object -First 1

          $makeWinPeMedia = @(
            foreach ($root in $assessmentRoots) {
              Get-ChildItem -LiteralPath $root -Filter 'MakeWinPEMedia.cmd' -File -Recurse -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty FullName
            }
          ) | Select-Object -First 1

          $winpeOcRoot = @(
            foreach ($root in $assessmentRoots) {
              Get-ChildItem -LiteralPath $root -Directory -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -like '*\amd64\WinPE_OCs' } |
                Select-Object -ExpandProperty FullName
            }
          ) | Select-Object -First 1

          Write-Host "ProgramFiles(x86): ${env:ProgramFiles(x86)}"
          Write-Host "ProgramFiles: $env:ProgramFiles"
          Write-Host "Windows Kits roots: $($existingKitsRoots -join '; ')"
          Write-Host "ADK roots found: $($assessmentRoots -join '; ')"
          Write-Host "copype candidate: $copype"
          Write-Host "MakeWinPEMedia candidate: $makeWinPeMedia"
          Write-Host "WinPE optional components root: $winpeOcRoot"

          foreach ($kitsRoot in $existingKitsRoots) {
            Write-Host "Windows Kits root snapshot: $kitsRoot"
            Get-ChildItem -LiteralPath $kitsRoot -Force | Select-Object FullName
          }

          foreach ($assessmentRoot in $assessmentRoots) {
            Write-Host "ADK root snapshot: $assessmentRoot"
            Get-ChildItem -LiteralPath $assessmentRoot -Force | Select-Object FullName
          }

          if (-not $copype) { throw 'copype.cmd was not found after ADK installation.' }
          if (-not $makeWinPeMedia) { throw 'MakeWinPEMedia.cmd was not found after ADK installation.' }
          if ([string]::IsNullOrWhiteSpace($winpeOcRoot) -or -not (Test-Path -LiteralPath $winpeOcRoot)) { throw "WinPE optional components not found: $winpeOcRoot" }

          $workDir = Join-Path $env:RUNNER_TEMP 'winpe_amd64'
          $mountDir = Join-Path $env:RUNNER_TEMP 'winpe_mount'
          $mediaDir = Join-Path $workDir 'media'
          $bootWim = Join-Path $mediaDir 'sources\boot.wim'

          if (Test-Path -LiteralPath $workDir) {
            Remove-Item -LiteralPath $workDir -Recurse -Force
          }
          if (Test-Path -LiteralPath $mountDir) {
            Remove-Item -LiteralPath $mountDir -Recurse -Force
          }

          Invoke-External -FilePath 'cmd.exe' -ArgumentList @('/c', "`"$copype`" amd64 `"$workDir`"")

          if (-not (Test-Path -LiteralPath $bootWim -PathType Leaf)) {
            throw "boot.wim was not created by copype: $bootWim"
          }

          Write-Host "boot.wim created at: $bootWim"

          New-Item -Path $mountDir -ItemType Directory -Force | Out-Null

          try {
            Invoke-External -FilePath 'dism.exe' -ArgumentList @(
              '/Mount-Image'
              "/ImageFile:$bootWim"
              '/Index:1'
              "/MountDir:$mountDir"
            )

            $mountedSystem32 = Join-Path $mountDir 'Windows\System32'
            if (-not (Test-Path -LiteralPath $mountedSystem32 -PathType Container)) {
              throw "Mounted WinPE image does not expose Windows\\System32: $mountedSystem32"
            }

            Write-Host "Mounted image system32 path: $mountedSystem32"

            $packages = @(
              'WinPE-WMI',
              'WinPE-NetFX',
              'WinPE-Scripting',
              'WinPE-PowerShell',
              'WinPE-StorageWMI',
              'WinPE-DismCmdlets'
            )

            foreach ($package in $packages) {
              $neutralCab = Join-Path $winpeOcRoot ($package + '.cab')
              $langCab = Join-Path $winpeOcRoot ('en-us\' + $package + '_en-us.cab')

              if (-not (Test-Path -LiteralPath $neutralCab -PathType Leaf)) {
                throw "Missing WinPE package: $neutralCab"
              }

              Write-Host "Adding WinPE package: $neutralCab"

              Invoke-External -FilePath 'dism.exe' -ArgumentList @(
                "/Image:$mountDir"
                '/Add-Package'
                "/PackagePath:$neutralCab"
              )

              if (Test-Path -LiteralPath $langCab -PathType Leaf) {
                Write-Host "Adding WinPE language package: $langCab"
                Invoke-External -FilePath 'dism.exe' -ArgumentList @(
                  "/Image:$mountDir"
                  '/Add-Package'
                  "/PackagePath:$langCab"
                )
              }
            }

            Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'autodeploy.ps1') -Destination (Join-Path $mountDir 'Windows\System32\autodeploy.ps1') -Force

            @'
            wpeinit
            powershell.exe -ExecutionPolicy Bypass -File X:\Windows\System32\autodeploy.ps1
            '@ | Set-Content -LiteralPath (Join-Path $mountDir 'Windows\System32\startnet.cmd') -Encoding ASCII

            Invoke-External -FilePath 'dism.exe' -ArgumentList @(
              '/Unmount-Image'
              "/MountDir:$mountDir"
              '/Commit'
            )
          }
          catch {
            if (Test-Path -LiteralPath $mountDir) {
              try {
                Start-Process -FilePath 'dism.exe' -ArgumentList @('/Unmount-Image', "/MountDir:$mountDir", '/Discard') -Wait -NoNewWindow | Out-Null
              }
              catch {
              }
            }

            throw
          }

          $isoPath = Join-Path $env:RUNNER_TEMP 'sysdeploy-win10pe.iso'
          Invoke-External -FilePath 'cmd.exe' -ArgumentList @('/c', "`"$makeWinPeMedia`" /ISO /F `"$workDir`" `"$isoPath`" /bootex")

          New-Item -Path (Join-Path $env:GITHUB_WORKSPACE 'out') -ItemType Directory -Force | Out-Null
          Copy-Item -LiteralPath $isoPath -Destination (Join-Path $env:GITHUB_WORKSPACE 'out\sysdeploy-win10pe.iso') -Force

      - name: Upload PE ISO
        uses: actions/upload-artifact@v4
        with:
          name: sysdeploy-win10pe
          path: out/sysdeploy-win10pe.iso
