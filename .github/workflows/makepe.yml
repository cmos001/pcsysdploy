name: makepe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      ADK_INSTALL_ROOT: C:\ADK
      ADK_LAYOUT_ROOT: C:\ADKLayout

    steps:
      - uses: actions/checkout@v4

      - name: Download official ADK installers
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2162950' -OutFile "$env:RUNNER_TEMP\adksetup.exe"
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2163233' -OutFile "$env:RUNNER_TEMP\adkwinpesetup.exe"

      - name: Install ADK Deployment Tools
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-Installer {
            param(
              [Parameter(Mandatory = $true)]
              [string]$FilePath,

              [Parameter(Mandatory = $true)]
              [string[]]$ArgumentList
            )

            Write-Host ("Running installer: {0} {1}" -f $FilePath, ($ArgumentList -join ' '))
            $process = Start-Process -FilePath $FilePath -ArgumentList $ArgumentList -Wait -PassThru -NoNewWindow
            Write-Host ("Installer exit code: {0}" -f $process.ExitCode)
            if ($process.ExitCode -ne 0) {
              throw ("Installer failed with exit code {0}: {1}" -f $process.ExitCode, $FilePath)
            }
          }

          if (-not (Test-Path -LiteralPath $env:ADK_INSTALL_ROOT)) {
            New-Item -Path $env:ADK_INSTALL_ROOT -ItemType Directory -Force | Out-Null
          }

          if (Test-Path -LiteralPath $env:ADK_LAYOUT_ROOT) {
            Remove-Item -LiteralPath $env:ADK_LAYOUT_ROOT -Recurse -Force
          }
          New-Item -Path $env:ADK_LAYOUT_ROOT -ItemType Directory -Force | Out-Null

          Invoke-Installer -FilePath "$env:RUNNER_TEMP\adksetup.exe" -ArgumentList @(
            '/quiet',
            '/layout', $env:ADK_LAYOUT_ROOT
          )

          $offlineAdkSetup = Join-Path $env:ADK_LAYOUT_ROOT 'adksetup.exe'
          if (-not (Test-Path -LiteralPath $offlineAdkSetup -PathType Leaf)) {
            throw "Offline ADK setup was not created in layout: $offlineAdkSetup"
          }

          Invoke-Installer -FilePath $offlineAdkSetup -ArgumentList @(
            '/quiet',
            '/norestart',
            '/ceip', 'off'
          )

          Write-Host "ADK layout snapshot: $env:ADK_LAYOUT_ROOT"
          Get-ChildItem -LiteralPath $env:ADK_LAYOUT_ROOT -Force -ErrorAction SilentlyContinue | Select-Object FullName

          Write-Host 'Windows Kits snapshot: C:\Program Files (x86)\Windows Kits\10'
          Get-ChildItem -LiteralPath 'C:\Program Files (x86)\Windows Kits\10' -Force -ErrorAction SilentlyContinue | Select-Object FullName

          Write-Host 'Searching for recent ADK logs under ProgramData'
          Get-ChildItem -LiteralPath 'C:\ProgramData' -Filter '*ADK*' -Recurse -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 20 FullName, LastWriteTime

      - name: Install WinPE add-on
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-Installer {
            param(
              [Parameter(Mandatory = $true)]
              [string]$FilePath,

              [Parameter(Mandatory = $true)]
              [string[]]$ArgumentList
            )

            Write-Host ("Running installer: {0} {1}" -f $FilePath, ($ArgumentList -join ' '))
            $process = Start-Process -FilePath $FilePath -ArgumentList $ArgumentList -Wait -PassThru -NoNewWindow
            Write-Host ("Installer exit code: {0}" -f $process.ExitCode)
            if ($process.ExitCode -ne 0) {
              throw ("Installer failed with exit code {0}: {1}" -f $process.ExitCode, $FilePath)
            }
          }

          $winPeLayout = Join-Path $env:ADK_LAYOUT_ROOT 'WinPE'
          if (Test-Path -LiteralPath $winPeLayout) {
            Remove-Item -LiteralPath $winPeLayout -Recurse -Force
          }
          New-Item -Path $winPeLayout -ItemType Directory -Force | Out-Null

          Invoke-Installer -FilePath "$env:RUNNER_TEMP\adkwinpesetup.exe" -ArgumentList @(
            '/quiet',
            '/layout', $winPeLayout
          )

          $offlineWinPeSetup = Join-Path $winPeLayout 'adkwinpesetup.exe'
          if (-not (Test-Path -LiteralPath $offlineWinPeSetup -PathType Leaf)) {
            throw "Offline WinPE setup was not created in layout: $offlineWinPeSetup"
          }

          Invoke-Installer -FilePath $offlineWinPeSetup -ArgumentList @(
            '/quiet',
            '/norestart',
            '/ceip', 'off'
          )

          Write-Host "WinPE layout snapshot: $winPeLayout"
          Get-ChildItem -LiteralPath $winPeLayout -Force -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Build PE and inject autodeploy only
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-External {
            param(
              [Parameter(Mandatory = $true)]
              [string]$FilePath,

              [Parameter(Mandatory = $true)]
              [string[]]$ArgumentList,

              [string]$WorkingDirectory
            )

            Write-Host ("Running: {0} {1}" -f $FilePath, ($ArgumentList -join ' '))
            $startProcessSplat = @{
              FilePath = $FilePath
              ArgumentList = $ArgumentList
              Wait = $true
              PassThru = $true
              NoNewWindow = $true
            }

            if (-not [string]::IsNullOrWhiteSpace($WorkingDirectory)) {
              $startProcessSplat['WorkingDirectory'] = $WorkingDirectory
            }

            $process = Start-Process @startProcessSplat
            if ($process.ExitCode -ne 0) {
              throw ("Command failed with exit code {0}: {1}" -f $process.ExitCode, $FilePath)
            }
          }

          function Get-AdkCandidateRoots {
            $roots = New-Object System.Collections.Generic.List[string]

            foreach ($path in @(
              $env:ADK_INSTALL_ROOT,
              'C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit',
              'C:\Program Files\Windows Kits\10\Assessment and Deployment Kit'
            )) {
              if (-not [string]::IsNullOrWhiteSpace($path) -and (Test-Path -LiteralPath $path)) {
                [void]$roots.Add($path)
              }
            }

            foreach ($regPath in @(
              'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows Kits\Installed Roots',
              'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots'
            )) {
              try {
                $item = Get-ItemProperty -Path $regPath -ErrorAction Stop
                foreach ($property in @('KitsRoot10', 'KitsRoot81')) {
                  $kitsRoot = [string]$item.$property
                  if (-not [string]::IsNullOrWhiteSpace($kitsRoot) -and (Test-Path -LiteralPath $kitsRoot)) {
                    $candidate = Join-Path $kitsRoot 'Assessment and Deployment Kit'
                    if (Test-Path -LiteralPath $candidate) {
                      [void]$roots.Add($candidate)
                    }
                  }
                }
              }
              catch {
              }
            }

            return @($roots | Select-Object -Unique)
          }

          function Find-FirstPath {
            param(
              [string[]]$Roots,
              [string]$Filter
            )

            foreach ($root in $Roots) {
              $match = @(
                Get-ChildItem -LiteralPath $root -Filter $Filter -File -Recurse -ErrorAction SilentlyContinue |
                  Select-Object -ExpandProperty FullName
              ) | Select-Object -First 1

              if ($match) {
                return $match
              }
            }

            return $null
          }

          function Find-WinPeOcRoot {
            param([string[]]$Roots)

            foreach ($root in $Roots) {
              $match = @(
                Get-ChildItem -LiteralPath $root -Directory -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -like '*\amd64\WinPE_OCs' } |
                  Select-Object -ExpandProperty FullName
              ) | Select-Object -First 1

              if ($match) {
                return $match
              }
            }

            return $null
          }

          function Invoke-DeploymentToolsBatch {
            param(
              [Parameter(Mandatory = $true)]
              [string]$EnvironmentBatch,

              [Parameter(Mandatory = $true)]
              [string]$ToolBatch,

              [Parameter(Mandatory = $true)]
              [string[]]$ToolArguments,

              [Parameter(Mandatory = $true)]
              [string]$WorkingDirectory
            )

            $quotedArgs = @()
            foreach ($argument in $ToolArguments) {
              if ($argument -match '\s') {
                $quotedArgs += ('"{0}"' -f $argument)
              }
              else {
                $quotedArgs += $argument
              }
            }

            $commandLine = 'call "{0}" && call "{1}" {2}' -f $EnvironmentBatch, $ToolBatch, ($quotedArgs -join ' ')
            Invoke-External -FilePath 'cmd.exe' -ArgumentList @('/c', $commandLine) -WorkingDirectory $WorkingDirectory
          }

          $adkRoots = Get-AdkCandidateRoots
          $dandISetEnv = Find-FirstPath -Roots $adkRoots -Filter 'DandISetEnv.bat'
          $copype = Find-FirstPath -Roots $adkRoots -Filter 'copype.cmd'
          $makeWinPeMedia = Find-FirstPath -Roots $adkRoots -Filter 'MakeWinPEMedia.cmd'
          $winpeOcRoot = Find-WinPeOcRoot -Roots $adkRoots

          Write-Host "Configured ADK install root: $env:ADK_INSTALL_ROOT"
          Write-Host "Configured ADK layout root: $env:ADK_LAYOUT_ROOT"
          Write-Host 'Candidate ADK roots:'
          $adkRoots | ForEach-Object { Write-Host " - $_" }
          Write-Host "DandISetEnv candidate: $dandISetEnv"
          Write-Host "copype candidate: $copype"
          Write-Host "MakeWinPEMedia candidate: $makeWinPeMedia"
          Write-Host "WinPE optional components root: $winpeOcRoot"

          foreach ($root in $adkRoots) {
            Write-Host "ADK root snapshot: $root"
            Get-ChildItem -LiteralPath $root -Force -ErrorAction SilentlyContinue | Select-Object FullName
          }

          if (-not $dandISetEnv) { throw 'DandISetEnv.bat was not found after ADK installation.' }
          if (-not $copype) { throw 'copype.cmd was not found after ADK installation.' }
          if (-not $makeWinPeMedia) { throw 'MakeWinPEMedia.cmd was not found after ADK installation.' }
          if ([string]::IsNullOrWhiteSpace($winpeOcRoot) -or -not (Test-Path -LiteralPath $winpeOcRoot)) { throw "WinPE optional components not found: $winpeOcRoot" }

          $workDir = Join-Path $env:RUNNER_TEMP 'winpe_amd64'
          $mountDir = Join-Path $env:RUNNER_TEMP 'winpe_mount'
          $mediaDir = Join-Path $workDir 'media'
          $bootWim = Join-Path $mediaDir 'sources\boot.wim'

          if (Test-Path -LiteralPath $workDir) {
            Remove-Item -LiteralPath $workDir -Recurse -Force
          }
          if (Test-Path -LiteralPath $mountDir) {
            Remove-Item -LiteralPath $mountDir -Recurse -Force
          }

          Invoke-DeploymentToolsBatch -EnvironmentBatch $dandISetEnv -ToolBatch $copype -ToolArguments @('amd64', $workDir) -WorkingDirectory (Split-Path -Parent $copype)

          if (-not (Test-Path -LiteralPath $bootWim -PathType Leaf)) {
            throw "boot.wim was not created by copype: $bootWim"
          }

          Write-Host "boot.wim created at: $bootWim"

          New-Item -Path $mountDir -ItemType Directory -Force | Out-Null

          try {
            Invoke-External -FilePath 'dism.exe' -ArgumentList @(
              '/Mount-Image'
              "/ImageFile:$bootWim"
              '/Index:1'
              "/MountDir:$mountDir"
            )

            $mountedSystem32 = Join-Path $mountDir 'Windows\System32'
            if (-not (Test-Path -LiteralPath $mountedSystem32 -PathType Container)) {
              throw "Mounted WinPE image does not expose Windows\\System32: $mountedSystem32"
            }

            Write-Host "Mounted image system32 path: $mountedSystem32"

            $packages = @(
              'WinPE-WMI',
              'WinPE-NetFX',
              'WinPE-Scripting',
              'WinPE-PowerShell',
              'WinPE-StorageWMI',
              'WinPE-DismCmdlets'
            )

            foreach ($package in $packages) {
              $neutralCab = Join-Path $winpeOcRoot ($package + '.cab')
              $langCab = Join-Path $winpeOcRoot ('en-us\' + $package + '_en-us.cab')

              if (-not (Test-Path -LiteralPath $neutralCab -PathType Leaf)) {
                throw "Missing WinPE package: $neutralCab"
              }

              Write-Host "Adding WinPE package: $neutralCab"

              Invoke-External -FilePath 'dism.exe' -ArgumentList @(
                "/Image:$mountDir"
                '/Add-Package'
                "/PackagePath:$neutralCab"
              )

              if (Test-Path -LiteralPath $langCab -PathType Leaf) {
                Write-Host "Adding WinPE language package: $langCab"
                Invoke-External -FilePath 'dism.exe' -ArgumentList @(
                  "/Image:$mountDir"
                  '/Add-Package'
                  "/PackagePath:$langCab"
                )
              }
            }

            Copy-Item -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'autodeploy.ps1') -Destination (Join-Path $mountDir 'Windows\System32\autodeploy.ps1') -Force

            $startnetContent = @(
              'wpeinit'
              'powershell.exe -ExecutionPolicy Bypass -File X:\Windows\System32\autodeploy.ps1'
            )
            Set-Content -LiteralPath (Join-Path $mountDir 'Windows\System32\startnet.cmd') -Value $startnetContent -Encoding ASCII

            Invoke-External -FilePath 'dism.exe' -ArgumentList @(
              '/Unmount-Image'
              "/MountDir:$mountDir"
              '/Commit'
            )
          }
          catch {
            if (Test-Path -LiteralPath $mountDir) {
              try {
                Start-Process -FilePath 'dism.exe' -ArgumentList @('/Unmount-Image', "/MountDir:$mountDir", '/Discard') -Wait -NoNewWindow | Out-Null
              }
              catch {
              }
            }

            throw
          }

          $isoPath = Join-Path $env:RUNNER_TEMP 'sysdeploy-win10pe.iso'
          Invoke-DeploymentToolsBatch -EnvironmentBatch $dandISetEnv -ToolBatch $makeWinPeMedia -ToolArguments @('/ISO', '/F', $workDir, $isoPath, '/bootex') -WorkingDirectory (Split-Path -Parent $makeWinPeMedia)

          New-Item -Path (Join-Path $env:GITHUB_WORKSPACE 'out') -ItemType Directory -Force | Out-Null
          Copy-Item -LiteralPath $isoPath -Destination (Join-Path $env:GITHUB_WORKSPACE 'out\sysdeploy-win10pe.iso') -Force

      - name: Upload PE ISO
        uses: actions/upload-artifact@v4
        with:
          name: sysdeploy-win10pe
          path: out/sysdeploy-win10pe.iso
